services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rolepbp-postgres
    environment:
      POSTGRES_USER: rolepbp
      POSTGRES_PASSWORD: rolepbp
      POSTGRES_DB: rolepbp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rolepbp -d rolepbp"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: rolepbp-backend
    ports:
      - "0.0.0.0:8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://rolepbp:rolepbp@postgres:5432/rolepbp
      UPLOAD_DIR: /app/campaign_uploads
      SYSTEM_MANUALS_DIR: /app/data/manuals
      SEED_MANUALS: "true"
      SEED_MONSTERS: "true"
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
      - campaign_uploads:/app/campaign_uploads
      - ./data/manuals:/app/data/manuals:ro
    command: ["sh", "-c", "python -m app.core.migrate && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"]
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: rolepbp-frontend
    ports:
      - "0.0.0.0:5173:5173"
    env_file:
      - .env
    environment:
      VITE_API_URL: ""
      VITE_PROXY_TARGET: http://backend:8000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
    depends_on:
      - backend

volumes:
  postgres_data:
  campaign_uploads:
