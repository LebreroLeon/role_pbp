services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rolepbp-postgres
    environment:
      POSTGRES_USER: rolepbp
      POSTGRES_PASSWORD: rolepbp
      POSTGRES_DB: rolepbp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rolepbp -d rolepbp"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
